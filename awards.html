<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awards — Big Cookies</title>
    <meta name="description" content="Awards and recognition earned by Big Cookies — National Bakery Awards, Small Business of the Year, and more.">
    <meta property="og:title" content="Awards — Big Cookies">
    <meta property="og:description" content="Awards and recognition earned by Big Cookies — National Bakery Awards, Small Business of the Year, and more.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Big Cookies">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" as="style">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="theme.css">
    <script>
    (function(){
        var t=localStorage.getItem('theme');
        if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark');}
    })();
    </script>
</head>
<body>
<div id="site-nav"></div>
<section style="padding-top:6rem">
    <div class="section-inner">
        <div class="section-label text-center">Recognition</div>
        <h2 class="section-title text-center">Awards & Accolades</h2>
        <p class="section-subtitle text-center mx-auto" style="max-width:560px">We don't bake for awards. But when they show up, we don't send them back.</p>
        <div data-load="data/awards.json" data-template="award-card" style="max-width:700px;margin:3rem auto 0;display:flex;flex-direction:column;gap:1.5rem"></div>
            
<section style="padding:4rem 2rem;text-align:center">
    <div class="section-inner">
        <h2 class="section-title">The only award that matters</h2>
        <p class="section-subtitle mx-auto" style="margin-bottom:2rem">Is the one you give us when you come back for a second box.</p>
        <a href="/" class="btn btn-primary btn-large">Back to the Shop</a>
    </div>
</section>
<div id="site-footer"></div>
<button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 4l-8 8h6v8h4v-8h6z" fill="currentColor"/></svg>
</button>
<div class="toast" id="toast"></div>
<script src="ui.js"></script>
<script src="nav.js"></script>
<script src="data-loader.js"></script>
<script src="app.js"></script>
</body>
</html>
