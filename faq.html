<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ — Big Cookies</title>
    <meta name="description" content="Frequently asked questions about Big Cookies — shipping, freshness, custom orders, and more.">
    <meta property="og:title" content="FAQ — Big Cookies">
    <meta property="og:description" content="Everything you need to know about ordering from Big Cookies.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Big Cookies">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" as="style">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="theme.css">
    <script>
    // Prevent dark-mode flash — must run before first paint
    (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>

</head>
<body>
<div class="scroll-progress" id="scrollProgress" style="width:0%"></div>

<div id="site-nav"></div>

<section id="faq" style="padding-top:6rem">
    <div class="section-inner">
        <div class="section-label text-center">FAQ</div>
        <h1 class="section-title text-center">You asked, we answered</h1>

        <div data-load="data/faq.json" data-template="faq-item" class="faq-list"></div>
    </div>
</section>


<section style="padding:4rem 2rem;text-align:center">
    <div class="section-inner">
        <h2 class="section-title">Still have questions?</h2>
        <p class="section-subtitle mx-auto" style="margin-bottom:2rem">
            If your question isn't answered here, drop us an email.
            We reply within hours — because we actually read them.
        </p>
        <a href="/" class="btn btn-primary btn-large">Back to the Shop →</a>
    </div>
</section>

<div id="site-footer"></div>

<button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 4l-8 8h6v8h4v-8h6z" fill="currentColor"/></svg>
</button>
<div class="toast" id="toast"></div>

<script src="ui.js"></script>
<script src="nav.js"></script>
<script src="data-loader.js"></script>
<script src="app.js"></script>
</body>
</html>
