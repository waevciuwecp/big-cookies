<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News — Big Cookies</title>
    <meta name="description" content="News and updates from Big Cookies — new flavors, awards, events, and behind-the-scenes stories.">
    <meta property="og:title" content="News — Big Cookies">
    <meta property="og:description" content="News and updates from Big Cookies — new flavors, awards, events, and behind-the-scenes stories.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Big Cookies">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" as="style">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="theme.css">
    <script>
    (function(){
        var t=localStorage.getItem('theme');
        if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark');}
    })();
    </script>
</head>
<body>
<div id="site-nav"></div>
<main id="main-content">
<section style="padding-top:6rem">
    <div class="section-inner">
        <div class="section-label text-center">News</div>
        <h1 class="section-title text-center">What's baking</h1>
        <p class="section-subtitle text-center mx-auto" style="max-width:560px">
            New flavors, events, and behind-the-scenes stories from the Big Cookies kitchen.
        </p>
        <div class="news-desk" id="newsDesk">
            <article class="news-lead" id="newsLead" aria-live="polite">
                <p class="news-desk-loading">Loading the latest dispatch…</p>
            </article>
            <aside class="news-issue-board" id="newsIssueBoard">
                <p class="news-desk-loading">Assembling the issue board…</p>
            </aside>
        </div>

        <div data-load="data/news.json" data-template="news-card" style="max-width:700px;margin:3rem auto 0;display:flex;flex-direction:column;gap:1.5rem"></div>
    </div>
</section>
<section style="padding:4rem 2rem;text-align:center">
    <div class="section-inner">
        <h2 class="section-title">Stay in the loop</h2>
        <p class="section-subtitle mx-auto" style="margin-bottom:2rem">New flavors, open days, and cookie science — delivered to your inbox.</p>
        <a href="mailto:hello@big-cookies.yaoyy.moe" class="btn btn-primary btn-large">Join the Newsletter</a>
    </div>
</section>
</main>
<div id="site-footer"></div>
<button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="20" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5"/>
        <circle cx="22" cy="22" r="20" fill="none" stroke="#fff" stroke-width="2.5" stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" id="backToTopRing" transform="rotate(-90 22 22)"/>
        <path d="M22 14l-6 8h4v8h4v-8h4z" fill="#fff"/>
    </svg>
</button>
<div class="toast" id="toast"></div>
<script src="url-helper.js"></script>
<script src="ui.js"></script>
<script src="nav.js"></script>
<script src="data-loader.js"></script>
<script src="app.js"></script>
<script>
(function() {
    var lead = document.getElementById('newsLead');
    var board = document.getElementById('newsIssueBoard');
    if (!lead || !board) return;

    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var boardCopy = {
        'New Flavor': 'Recipe desk: active',
        'Awards': 'Judges impressed by depth',
        'Events': 'Open-day attendance climbed again',
        'Shipping': 'Operations desk expanded routes',
        'Team': 'Studio notes from the bench'
    };

    fetch('data/news.json', { cache: 'no-cache' })
        .then(function(response) {
            if (!response.ok) throw new Error('HTTP ' + response.status);
            return response.json();
        })
        .then(function(items) {
            if (!Array.isArray(items) || !items.length) throw new Error('No stories');
            var latest = items[0];
            var date = new Date(latest.date);
            var dateLabel = months[date.getMonth()] + ' ' + date.getDate() + ', ' + date.getFullYear();

            lead.innerHTML =
                '<div class="news-lead-kicker">Issue ' + (Array.isArray(items) ? String(items.length).padStart(2,'0') : '06') + ' / Bakery Dispatch</div>' +
                '<div class="news-lead-meta"><span>' + dateLabel + '</span><span>' + (latest.tag || 'Dispatch') + '</span></div>' +
                '<h2>' + latest.title + '</h2>' +
                '<p>' + latest.excerpt + '</p>' +
                '<div class="news-lead-footer"><span>' + (latest.readTime || '2 min read') + '</span><a href="#main-content">Read the full board</a></div>';

            board.innerHTML = items.slice(1).map(function(item, index) {
                return '<div class="news-issue-card">' +
                    '<span class="news-issue-index">0' + (index + 1) + '</span>' +
                    '<strong>' + item.tag + '</strong>' +
                    '<p>' + (boardCopy[item.tag] || item.excerpt.slice(0, 72) + '...') + '</p>' +
                '</div>';
            }).join('');
        })
        .catch(function() {
            lead.innerHTML = '<p class="news-desk-loading">Open the site through a local server or production host to load the latest dispatch.</p>';
            board.innerHTML = '';
        });
})();
</script>
</body>
</html>
