<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mugBody"><stop offset="0%" stop-color="#FFF9F2"/><stop offset="100%" stop-color="#F0E0C8"/></linearGradient>
    <linearGradient id="coffeeFill"><stop offset="0%" stop-color="#4A2C17"/><stop offset="100%" stop-color="#2E1808"/></linearGradient>
    <radialGradient id="steamGlow"><stop offset="0%" stop-color="#C8853E" stop-opacity="0.4"/><stop offset="100%" stop-color="#C8853E" stop-opacity="0"/></radialGradient>
  </defs>
  <!-- saucer --><ellipse cx="140" cy="165" rx="45" ry="10" fill="#E8DCC8" stroke="#C8853E" stroke-width="1.5"/><ellipse cx="140" cy="163" rx="38" ry="7" fill="#F0E8DB"/>
  <!-- mug body --><path d="M110 105c0-20 12-36 30-36s30 16 30 36v50c0 8-6 14-14 14h-32c-8 0-14-6-14-14z" fill="url(#mugBody)" stroke="#5C3D2E" stroke-width="3"/>
  <!-- coffee inside mug --><ellipse cx="140" cy="105" rx="28" ry="7" fill="url(#coffeeFill)"/><ellipse cx="140" cy="105" rx="26" ry="6" fill="#3A1E0A"/>
  <!-- latte art (simple heart) --><path d="M140 108c-3-4-6-2-5 2c1.5 2 5 2 5 2s3.5 0 5-2c1-4-2-6-5-2z" fill="#D4954B" opacity="0.6"/>
  <!-- mug handle --><path d="M170 120c12 0 18-6 18-12s-6-12-18-12" fill="none" stroke="#5C3D2E" stroke-width="5" stroke-linecap="round"/>
  <!-- steam wisps --><path d="M130 80c-2-14 4-25 8-32" fill="none" stroke="#C8853E" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><path d="M140 72c0-12 3-22 6-30" fill="none" stroke="#C8853E" stroke-width="3" stroke-linecap="round" opacity="0.6"/><path d="M150 80c2-14-4-25-8-32" fill="none" stroke="#C8853E" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- steam wisps wider --><path d="M127 76c-3-10-6-18-10-22" fill="none" stroke="#E8A850" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/><path d="M153 76c3-10 6-18 10-22" fill="none" stroke="#E8A850" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- cookie --><circle cx="50" cy="130" r="30" fill="#C8853E" stroke="#A8612E" stroke-width="2"/>
  <circle cx="50" cy="130" r="30" fill="none" stroke="#D4954B" stroke-width="1" opacity="0.3"/>
  <!-- chocolate chips --><ellipse cx="38" cy="120" rx="4.5" ry="6.5" fill="#3C1D0E" transform="rotate(-15 38 120)"/><ellipse cx="62" cy="118" rx="4" ry="6" fill="#3C1D0E" transform="rotate(20 62 118)"/><ellipse cx="55" cy="142" rx="4.5" ry="6" fill="#3C1D0E" transform="rotate(-10 55 142)"/><ellipse cx="36" cy="138" rx="3.5" ry="5.5" fill="#3C1D0E" transform="rotate(-30 36 138)"/><ellipse cx="48" cy="130" rx="4" ry="6" fill="#3C1D0E" transform="rotate(5 48 130)"/>
  <!-- bite mark --><circle cx="72" cy="140" r="10" fill="#FFF9F2"/>
  <!-- cookie crumbs --><circle cx="78" cy="150" r="2.5" fill="#C8853E" opacity="0.45"/><circle cx="82" cy="145" r="1.8" fill="#D4954B" opacity="0.35"/>
  <!-- napkin under cookie --><path d="M15 160l35-5 35 5" fill="none" stroke="#F0E8DB" stroke-width="2" opacity="0.4"/>
  <!-- small spoon --><rect x="165" y="145" width="4" height="25" rx="2" fill="#A0A0A0"/><ellipse cx="167" cy="145" rx="8" ry="5" fill="#C0C0C0" stroke="#A0A0A0" stroke-width="1"/>
</svg>
