<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sunGlow"><stop offset="0%" stop-color="#E8A850" stop-opacity="0.9"/><stop offset="60%" stop-color="#F5D5A0" stop-opacity="0.3"/><stop offset="100%" stop-color="#FDF3E2" stop-opacity="0"/></radialGradient>
    <linearGradient id="counterTop"><stop offset="0%" stop-color="#6B3A20"/><stop offset="100%" stop-color="#4A2510"/></linearGradient>
    <linearGradient id="trayMetal"><stop offset="0%" stop-color="#D4954B"/><stop offset="100%" stop-color="#A8612E"/></linearGradient>
  </defs>
  <!-- sky bg --><rect x="0" y="0" width="200" height="110" rx="20" fill="#FDF3E2" opacity="0.5"/>
  <!-- sun glow --><circle cx="100" cy="60" r="65" fill="url(#sunGlow)"/>
  <!-- sun disc --><circle cx="100" cy="55" r="28" fill="#E8A850"/><circle cx="100" cy="55" r="28" fill="none" stroke="#D4954B" stroke-width="1" opacity="0.4"/>
  <!-- sun rays long --><line x1="100" y1="10" x2="100" y2="20" stroke="#E8A850" stroke-width="3.5" stroke-linecap="round"/><line x1="135" y1="25" x2="126" y2="32" stroke="#E8A850" stroke-width="3" stroke-linecap="round"/><line x1="65" y1="25" x2="74" y2="32" stroke="#E8A850" stroke-width="3" stroke-linecap="round"/><line x1="150" y1="55" x2="140" y2="55" stroke="#E8A850" stroke-width="2.5" stroke-linecap="round"/><line x1="50" y1="55" x2="60" y2="55" stroke="#E8A850" stroke-width="2.5" stroke-linecap="round"/>
  <!-- sun rays short --><line x1="135" y1="85" x2="127" y2="80" stroke="#E8A850" stroke-width="2" stroke-linecap="round" opacity="0.6"/><line x1="65" y1="85" x2="73" y2="80" stroke="#E8A850" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- counter surface --><rect x="20" y="115" width="160" height="16" rx="6" fill="url(#counterTop)"/><rect x="20" y="115" width="160" height="4" rx="2" fill="#8B6F5C" opacity="0.35"/>
  <!-- counter legs --><rect x="60" y="131" width="8" height="55" rx="3" fill="#5C3D2E"/><rect x="132" y="131" width="8" height="55" rx="3" fill="#5C3D2E"/>
  <!-- rolling pin on counter --><rect x="100" y="106" width="60" height="10" rx="5" fill="#D4B896"/><rect x="102" y="108" width="56" height="6" rx="3" fill="#E8D5B8"/><rect x="95" y="107" width="8" height="8" rx="4" fill="#A8855C"/><rect x="157" y="107" width="8" height="8" rx="4" fill="#A8855C"/>
  <!-- baking tray --><rect x="45" y="96" width="45" height="18" rx="5" fill="url(#trayMetal)"/><rect x="45" y="96" width="45" height="6" rx="3" fill="#D4954B" opacity="0.5"/><line x1="55" y1="96" x2="55" y2="114" stroke="#8B5A2E" stroke-width="1" opacity="0.3"/><line x1="67" y1="96" x2="67" y2="114" stroke="#8B5A2E" stroke-width="1" opacity="0.3"/><line x1="79" y1="96" x2="79" y2="114" stroke="#8B5A2E" stroke-width="1" opacity="0.3"/>
  <!-- dough balls on tray --><ellipse cx="55" cy="102" rx="6" ry="4" fill="#E8D5B8"/><ellipse cx="67" cy="101" rx="5.5" ry="3.5" fill="#DCC5A0"/><ellipse cx="79" cy="102" rx="6" ry="4" fill="#E8D5B8"/>
  <!-- coffee cup --><rect x="146" y="104" width="24" height="18" rx="5" fill="#FFF9F2"/><path d="M170 108c4 0 7 3 7 6s-3 6-7 6" fill="none" stroke="#FFF9F2" stroke-width="3"/><ellipse cx="158" cy="104" rx="12" ry="3.5" fill="#C8853E" opacity="0.25"/>
  <!-- steam from coffee --><path d="M155 97c1-6 4-10 4-10" fill="none" stroke="#C8853E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/><path d="M162 95c0-5 2-8 2-8" fill="none" stroke="#C8853E" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- clock on wall --><circle cx="45" cy="40" r="18" fill="#FFF9F2" stroke="#5C3D2E" stroke-width="2"/><circle cx="45" cy="40" r="14" fill="none" stroke="#C8853E" stroke-width="0.5" opacity="0.3"/><line x1="45" y1="40" x2="45" y2="28" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/><line x1="45" y1="40" x2="53" y2="44" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/><text x="45" y="48" text-anchor="middle" font-size="6" font-weight="800" fill="#C8853E" font-family="Inter,sans-serif">4:30</text>
</svg>
