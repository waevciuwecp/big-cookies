<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="boxGrad"><stop offset="0%" stop-color="#D4B896"/><stop offset="100%" stop-color="#B8956E"/></linearGradient>
  </defs>
  <!-- shipping box --><rect x="40" y="80" width="120" height="90" rx="6" fill="url(#boxGrad)" stroke="#8B6F5C" stroke-width="2.5"/>
  <!-- box flaps top --><path d="M40 80l30-25h60l30 25" fill="#C8A878" stroke="#8B6F5C" stroke-width="2"/>
  <!-- box flap shadow --><path d="M70 55l30 25h60" fill="none" stroke="#A8855C" stroke-width="1" opacity="0.4"/>
  <!-- tape strip top --><rect x="60" y="72" width="80" height="10" rx="2" fill="#E8DCC8" opacity="0.7"/>
  <!-- tape strip center --><rect x="70" y="115" width="60" height="10" rx="2" fill="#E8DCC8" opacity="0.6"/>
  <!-- shipping label --><rect x="55" y="98" width="55" height="40" rx="3" fill="#FFF9F2" stroke="#C8853E" stroke-width="1.2"/>
  <!-- label barcode --><line x1="60" y1="105" x2="106" y2="105" stroke="#333" stroke-width="0.6"/><line x1="60" y1="108" x2="108" y2="108" stroke="#333" stroke-width="0.8"/><line x1="60" y1="111" x2="104" y2="111" stroke="#333" stroke-width="0.5"/><line x1="60" y1="114" x2="107" y2="114" stroke="#333" stroke-width="0.7"/>
  <!-- label text --><line x1="60" y1="120" x2="102" y2="120" stroke="#C8853E" stroke-width="0.8"/><line x1="60" y1="124" x2="96" y2="124" stroke="#C8853E" stroke-width="0.8"/><line x1="60" y1="128" x2="100" y2="128" stroke="#C8853E" stroke-width="0.8"/>
  <!-- priority stamp --><rect x="115" y="100" width="38" height="22" rx="3" fill="#E8A850" stroke="#C8853E" stroke-width="1"/><text x="134" y="115" text-anchor="middle" font-size="8" font-weight="800" fill="#FFF" font-family="Inter,sans-serif">SAME DAY</text>
  <!-- clock icon on box --><circle cx="155" cy="140" r="16" fill="#FFF9F2" stroke="#5C3D2E" stroke-width="1.8"/><line x1="155" y1="140" x2="155" y2="129" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/><line x1="155" y1="140" x2="164" y2="140" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/><text x="155" y="149" text-anchor="middle" font-size="5" font-weight="700" fill="#C8853E" font-family="Inter,sans-serif">4PM</text>
  <!-- motion lines --><line x1="15" y1="110" x2="30" y2="110" stroke="#C8853E" stroke-width="2" stroke-linecap="round" opacity="0.5"/><line x1="10" y1="120" x2="30" y2="120" stroke="#C8853E" stroke-width="2" stroke-linecap="round" opacity="0.4"/><line x1="15" y1="130" x2="30" y2="130" stroke="#C8853E" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- tiny cookie beside box --><circle cx="170" cy="165" r="10" fill="#C8853E"/><ellipse cx="167" cy="163" rx="2" ry="2.5" fill="#3C1D0E" transform="rotate(-10 167 163)"/><ellipse cx="173" cy="162" rx="1.8" ry="2.5" fill="#3C1D0E" transform="rotate(15 173 162)"/>
</svg>
