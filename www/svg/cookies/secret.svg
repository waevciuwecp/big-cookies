<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="85%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <radialGradient id="chipGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#5C3020"/>
      <stop offset="60%" stop-color="#3C1D0E"/>
      <stop offset="100%" stop-color="#1A0A04"/>
    </radialGradient>
  </defs>
  <!-- Cookie base with bite mark -->
  <circle cx="50" cy="50" r="44" fill="url(#goldGrad)"/>
  <!-- Mask for bite mark -->
  <clipPath id="bite">
    <rect x="0" y="0" width="100" height="100"/>
    <circle cx="96" cy="52" r="24"/>
  </clipPath>
  <circle cx="50" cy="50" r="44" fill="url(#goldGrad)" clip-path="url(#bite)"/>
  <!-- Surface texture -->
  <circle cx="50" cy="50" r="44" fill="none" opacity="0.15">
    <animate attributeName="r" values="44;46;44" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Chocolate chips -->
  <ellipse cx="35" cy="32" rx="10" ry="7" fill="url(#chipGrad)" transform="rotate(-15 35 32)"/>
  <ellipse cx="58" cy="35" rx="9" ry="6.5" fill="url(#chipGrad)" transform="rotate(20 58 35)"/>
  <ellipse cx="30" cy="52" rx="8" ry="6" fill="url(#chipGrad)" transform="rotate(-30 30 52)"/>
  <ellipse cx="62" cy="50" rx="9" ry="7" fill="url(#chipGrad)" transform="rotate(25 62 50)"/>
  <ellipse cx="42" cy="62" rx="7" ry="5" fill="url(#chipGrad)" transform="rotate(-10 42 62)"/>
  <ellipse cx="55" cy="65" rx="8" ry="5.5" fill="url(#chipGrad)" transform="rotate(15 55 65)"/>
  <!-- Gold shimmer lines -->
  <path d="M20 30 Q35 25 40 35" fill="none" stroke="#FFF8DC" stroke-width="0.8" opacity="0.6"/>
  <path d="M55 22 Q65 20 68 28" fill="none" stroke="#FFF8DC" stroke-width="0.6" opacity="0.4"/>
  <path d="M25 65 Q35 70 38 62" fill="none" stroke="#FFF8DC" stroke-width="0.7" opacity="0.5"/>
  <!-- Tiny sparkle -->
  <text x="72" y="22" font-size="8" opacity="0.8">✨</text>
</svg>
